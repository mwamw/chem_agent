version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chemintel
      POSTGRES_USER: chemintel
      POSTGRES_PASSWORD: chemintel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemintel -d chemintel"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "8000:8000"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started

  migrator:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
